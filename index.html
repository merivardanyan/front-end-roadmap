<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front end road map</title>
    <link rel="stylesheet" href="css/global.css">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body>
    <svg style="display:none;">
        <symbol id="arrow-down" viewBox="0 0 24 24">
            <path
                d="M11.0001 3.67157L13.0001 3.67157L13.0001 16.4999L16.2426 13.2574L17.6568 14.6716L12 20.3284L6.34314 14.6716L7.75735 13.2574L11.0001 16.5001L11.0001 3.67157Z"
                fill="currentColor" />
        </symbol>
    </svg>
    <header>
        <div class="grid grid-cols-2 gap-4 container mx-auto items-center py-4">
            <div class="logo">MV</div>
            <nav class="nav justify-self-end">
                <ul class="flex gap-4">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#progress">Progress</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section class="hero secondary-bg py-12">
            <div class="container mx-auto text-center">
                <h1 class="text-4xl font-bold mb-4">Front End Roadmap</h1>
                <p class="text-lg text-gray-700">Your guide to becoming a front-end developer</p>
                <div class="progress flex w-5/6 justify-center items-center mt-8 mx-auto">
                    <div class="progress-bar w-5/6 rounded-full h-4 mt-4 relative">
                        <div class="done"></div>
                    </div>
                    <div class="progress-text ml-4 w-1/6"> <span class="font-bold progress-percent">0</span> % Complete
                    </div>
                </div>
            </div>
        </section>
        <section id="roadmap">
            <div class="chapter grid grid-cols-1 xl:grid-cols-3 gap-4 container mx-auto py-12">
                <div class="left-side justify-self-start w-full">
                    <ul class="chapter-list">
                    </ul>
                </div>
                <div class="center justify-self-center w-full">
                    <ul class="chapter-list">
                    </ul>
                </div>
                <div class="right-side justify-self-end w-full">
                    <ul class="chapter-list">
                    </ul>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>

    <script src="js/main.js"></script>
</body>

</html>
