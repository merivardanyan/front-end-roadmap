<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/global.css">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body>
    <svg style="display:none;">
        <symbol id="arrow-down" viewBox="0 0 24 24">
            <path
                d="M11.0001 3.67157L13.0001 3.67157L13.0001 16.4999L16.2426 13.2574L17.6568 14.6716L12 20.3284L6.34314 14.6716L7.75735 13.2574L11.0001 16.5001L11.0001 3.67157Z"
                fill="currentColor" />
        </symbol>
    </svg>
    <header>
        <div class="grid grid-cols-2 gap-4 container mx-auto items-center py-4">
            <div class="logo">MV</div>
            <nav class="nav justify-self-end">
                <ul class="flex gap-4">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Progress</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section class="hero secondary-bg py-12">
            <div class="container mx-auto text-center">
                <h1 class="text-4xl font-bold mb-4">HTML Roadmap</h1>
                <p class="text-lg text-gray-700">Your guide to becoming a front-end developer</p>
            </div>
        </section>
        <section id="roadmap">
            <div class="chapter grid grid-cols-[20%_80%] gap-4 w-full container mx-auto py-12">
                <div class="left-side justify-self-start">
                    <ul class="chapter-list">
                    </ul>
                </div>
                <div class="right-side justify-self-end w-full explanation_container">
                    <ul class="chapter-list">
                    </ul>
                </div>
            </div>
        </section>

    </main>

    <script>
        const chapter = document.location.search.split('=')[1];
        // console.log(document.location.search.split('=')[1]);
        fetch('json/lessons.json')
            .then(response => response.json())
            .then(data => {
                console.log(data.chapters[chapter]);
                show_chapters(data.chapters[chapter].lessons);
            });

        async function fetchWithCache(url) {
            const cache = await caches.open('lessons-v1');
            const cached = await cache.match(url);
            if (cached) return cached.json();
            const response = await fetch(url);
            cache.put(url, response.clone());
            return response.json();
        }

        function show_chapters(arr) {
            arr.forEach((lesson, ind) => {
                const li = document.createElement('li');
                li.className = 'font-bold';
                li.innerHTML = `
                        <div class="lesson-info flex items-center gap-2">
                            <input class="lesson-checkbox-input" type="checkbox" id="${lesson.slug}"
                                name="${lesson.slug}" />
                            <label for="${lesson.slug}" class="checkbox">
                            </label>
                            <span class="lesson-title">${lesson.title}</span>
                            <div class="lesson">Lesson ${lesson.order}</div>
                        </div>
                        <div class="flex justify-center py-2">
                        <svg class="w-6 h-6">
                            <use href="#arrow-down"></use>
                        </svg>
                    </div>
                `;
                li.onclick = () => {
                    fetchWithCache(`json/lessons/${chapter}/${lesson.id}.json`).then(data => {
                        show_lesson(data);
                    });
                }
                document.querySelector('.chapter-list').appendChild(li);
                function show_lesson(lesson) {
                    const explanation_container = document.querySelector('.explanation_container');
                    explanation_container.innerHTML = ``;
                    lesson.sections.forEach(section => {
                        const section_div = document.createElement('div');
                        section_div.className = 'section';
                        section_div.className = section.type;
                        section_div.innerHTML = `
                           <h3 class="text-xl font-bold mb-2">${section?.title ?? 'Introduction'}</h3>
                           <p class="text-gray-700">${section.text}</p>
                       `;
                        explanation_container.appendChild(section_div);
                    });
                }
            })
        }
    </script>
</body>

</html>
